name: Release

on:
  push:
    tags:
      - 'v*'   # triggers on v2.2.6, v2.3.0, etc.

jobs:

  # ---------------------------------------------------------------------------
  # QA must pass before the zip is built and released.
  # ---------------------------------------------------------------------------
  qa:
    name: PHP Lint & Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer

      - name: Install PHPCS + WordPress standards
        working-directory: internete-gmb-reviews
        run: composer install --no-progress --prefer-dist

      - name: PHP syntax check
        run: |
          echo "Checking PHP syntax..."
          ERROR=0
          while IFS= read -r -d '' file; do
            if ! php -l "$file" > /dev/null 2>&1; then
              php -l "$file"
              ERROR=1
            fi
          done < <(find internete-gmb-reviews -name "*.php" -not -path "*/vendor/*" -print0)
          if [ $ERROR -ne 0 ]; then
            echo "::error::PHP syntax errors found. Release blocked."
            exit 1
          fi
          echo "All PHP files passed syntax check."

      - name: PHPCS security scan (blocks release on errors)
        working-directory: internete-gmb-reviews
        run: |
          vendor/bin/phpcs --standard=phpcs-security.xml \
            --warning-severity=0 \
            --report=full \
            --colors \
            .

      - name: PHPCS WordPress standards (advisory)
        working-directory: internete-gmb-reviews
        run: vendor/bin/phpcs --standard=phpcs.xml --report=summary --colors . || true

  # ---------------------------------------------------------------------------
  # Build zip — only runs if QA passes
  # ---------------------------------------------------------------------------
  build-and-release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    needs: qa
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build plugin zip
        run: |
          mkdir -p build
          rsync -r \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='build' \
            --exclude='vendor' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            --exclude='phpcs.xml' \
            --exclude='phpcs-security.xml' \
            internete-gmb-reviews/ \
            build/internete-gmb-reviews/
          cd build
          zip -r internete-gmb-reviews.zip internete-gmb-reviews/

      - name: Create GitHub Release and upload zip
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          files: build/internete-gmb-reviews.zip
          generate_release_notes: true
          body: |
            ## Internete GMB Reviews v${{ steps.version.outputs.VERSION }}

            ### Installation
            1. Download `internete-gmb-reviews.zip` below
            2. Go to WordPress Admin → Plugins → Add New → Upload Plugin
            3. Upload the zip and activate

            ### Already installed?
            If you installed from WordPress.org, your site will receive this update automatically.
